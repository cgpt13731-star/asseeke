<!DOCTYPE html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SANA AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-left"></div>
    <div class="background-glow background-glow-right"></div>

    <main class="page-shell">
      <section class="hero card">
        <div class="hero-copy">
          <p class="eyebrow">SANA AI</p>
          <h1>Оқушыға арналған қолдау және мотивация платформасы</h1>
        </div>
      </section>

      <section class="top-grid">
        <section class="profile-intro card">
          <label class="input-label" for="studentName">Оқушының аты</label>
          <input id="studentName" type="text" placeholder="Атыңды жаз..." maxlength="40" />
        </section>

        <section class="summary card">
          <p class="eyebrow">Қалай жұмыс істейді?</p>
          <h2>Екі қадам</h2>
          <div class="summary-list">
            <div class="summary-item">1. Оқушы аты мен тест жауаптарын толтыру</div>
            <div class="summary-item">2. Жеке нәтиже бетіне автоматты өту</div>
            <div class="summary-item">3. Мотивация, кеңес және жауаптарды көру</div>
          </div>
        </section>
      </section>

      <section class="content-grid single-column">
        <section class="survey card">
          <div class="section-title-row">
            <div>
              <p class="eyebrow">Тест</p>
              <h2>Лусканова Н.Г. «Оқу іс-әрекетінің мотивациясы»</h2>
            </div>
            <span class="pill">10 сұрақ</span>
          </div>

          <form id="surveyForm" class="survey-form"></form>

          <button id="submitBtn" class="primary-button" type="button">
            Нәтижеге өту
          </button>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
